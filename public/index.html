<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anonymous Chat - Connect and chat with people anonymously in real-time">
    <title>Anonymous Chat</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8537594804200864"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://hammerjs.github.io/dist/hammer.min.js"></script>
</head>
<body>
    <!-- Greeting Page -->
    <div id="greeting-page" class="page active">
        <div class="container">
            <h1>Anonymous Chat</h1>
            <p>Connect and chat with people anonymously in real-time</p>
            <div class="button-group create-options">
                <button id="create-public-btn" class="btn primary">
                    <i class="fas fa-globe"></i> Create Public Room
                </button>
                <button id="create-private-btn" class="btn primary">
                    <i class="fas fa-lock"></i> Create Private Room
                </button>
                <button id="join-room-btn" class="btn secondary">
                    <i class="fas fa-door-open"></i> Join Private Room
                </button>
            </div>
            <div class="ad-container ad-container--landing">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-8537594804200864"
                     data-ad-slot="REPLACE_WITH_YOUR_AD_SLOT"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
            </div>
        </div>
    </div>

    <!-- Join Room Page (private rooms only) -->
    <div id="join-room-page" class="page">
        <div class="container">
            <h1>Join a Room</h1>
            <p>Enter the 6-digit room key to join a private chat</p>
            <div class="input-group">
                <input 
                    type="text" 
                    id="room-key-input" 
                    placeholder="Enter room key" 
                    maxlength="6" 
                    pattern="[0-9]{6}"
                    inputmode="numeric"
                >
                <div class="error-message" id="join-error-message"></div>
            </div>
            <div class="button-group">
                <button id="join-submit-btn" class="btn primary">
                    <i class="fas fa-sign-in-alt"></i> Join
                </button>
                <button id="join-back-btn" class="btn secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
            <div class="ad-container ad-container--landing">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-8537594804200864"
                     data-ad-slot="REPLACE_WITH_YOUR_AD_SLOT"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
            </div>
        </div>
    </div>

    <!-- Chat Room Page -->
    <div id="chat-room-page" class="page">
        <div class="chat-container">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="room-info">
                    <h2><i class="fas fa-hashtag"></i> Room <span id="room-key-display"></span></h2>
                    <p><i class="fas fa-user-circle"></i> <span id="username-wrapper"><span id="username-display" contenteditable="true" title="Click to edit your username"></span><span id="edit-icon"><i class="fas fa-edit"></i></span></span></p>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="btn-icon theme-toggle" title="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="admin-key-btn" class="btn-icon" title="Unlock admin with management key">
                        <i class="fas fa-lock"></i>
                    </button>
                    <button id="members-btn" class="btn-icon" title="Members">
                        <i class="fas fa-user-group"></i>
                    </button>
                    <div class="user-count">
                        <p><i class="fas fa-users"></i> <span id="user-count-display">1</span></p>
                    </div>
                </div>
                <div class="admin-controls" id="admin-controls">
                    <button id="delete-room-btn" class="btn danger">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>

            <!-- Members Panel -->
            <div class="members-panel" id="members-panel">
                <div class="members-header">
                    <h3><i class="fas fa-user-group"></i> Members</h3>
                    <button id="members-close" class="btn-icon" title="Close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="members-list" id="members-list"></div>
            </div>

            <!-- Chat Messages Area -->
            <div class="chat-messages" id="chat-messages">
                <div class="system-message">
                    <i class="fas fa-info-circle"></i> Welcome to the chat room! You can now start chatting anonymously.
                </div>
            </div>

            <!-- Reply Container -->
            <div class="reply-container" id="reply-container">
                <div class="reply-content">
                    <div class="reply-text">
                        <span class="reply-username" id="reply-username"></span>
                        <span id="reply-message"></span>
                    </div>
                    <button id="cancel-reply" class="btn-icon" title="Cancel reply">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator"></div>

            <!-- Scroll to Bottom Button -->
            <button id="scroll-to-bottom-btn" class="btn-icon scroll-to-bottom-btn" title="Scroll to bottom">
                <i class="fas fa-chevron-down"></i>
            </button>

            <div class="ad-container ad-container--chat">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-8537594804200864"
                     data-ad-slot="REPLACE_WITH_YOUR_AD_SLOT"
                     data-ad-format="horizontal"
                     data-full-width-responsive="true"></ins>
            </div>

            <!-- Chat Input Area -->
            <div class="chat-input-container">
                <div class="chat-input">
                    <input 
                        type="text" 
                        id="message-input" 
                        placeholder="Type a message..."
                        autocomplete="off"
                    >
                </div>
                <button id="send-message-btn" class="send-btn" title="Send message">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Socket.IO and App Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
